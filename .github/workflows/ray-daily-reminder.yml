      #      -d "text=🍕 *La Pizza Cubana — Resumen Diario*%0A%0ATODO para hoy, Ray:%0A✅ Publicar en Instagram%0A✅ Revisar WhatsApp%0A✅ Revisar Google reseñas%0A%0A[Abrir Dashboard](https://la-pizza-cubana.vercel.app/ray)"
