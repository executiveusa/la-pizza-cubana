name: Ray Daily Content Reminder

# Runs every day at 9am Mexico City time (UTC-6 = 15:00 UTC)
# To enable: add WHATSAPP_NOTIFY_NUMBER secret in GitHub repo settings
# Optional: add TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID for Telegram alerts

on:
  schedule:
    - cron: '0 15 * * *'   # 9:00am CST (UTC-6) Monday–Sunday
  workflow_dispatch:        # Manual run button in GitHub UI

jobs:
  daily-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Generate daily social media reminder
        run: |
          DAY=$(date +%A)
          DATE=$(date '+%d %B %Y')
          echo "==================================="
          echo "  La Pizza Cubana — Daily Brief"
          echo "  $DAY, $DATE"
          echo "==================================="
          echo ""
          echo "TODO para hoy, Ray:"
          echo "  1. ✅ Publicar en Instagram (usa plantilla en ray.html)"
          echo "  2. ✅ Revisar mensajes de WhatsApp"
          echo "  3. ✅ Revisar reseñas en Google Maps"
          echo "  4. ✅ Contar pizzas del día en el dashboard"
          echo ""
          echo "🍕 Dashboard: https://la-pizza-cubana.vercel.app/ray"
          echo "📲 WhatsApp:  https://wa.me/5213223041169"
          echo ""
          echo "ZTE-POPE-BOT STUB v1.0"
          echo "Ready to wire with thepopebot when API keys are provided."
          echo "See: https://github.com/executiveusa/paulis-pope-bot"

      # OPTIONAL TELEGRAM NOTIFICATION
