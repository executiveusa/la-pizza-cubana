name: Ray Daily Content Reminder

# Runs every day at 9am Mexico City time (UTC-6 = 15:00 UTC)
on:
  schedule:
    - cron: '0 15 * * *'   # 9:00am CST (UTC-6) Monday-Sunday
  workflow_dispatch:        # Manual run button in GitHub UI

jobs:
  daily-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Pope Bot daily briefing
        env:
          POPE_SECRET: ${{ secrets.POPE_SECRET }}
        run: |
          echo "Calling /api/pope ..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://la-pizza-cubana.vercel.app/api/pope" \
            -H "x-pope-secret: ${POPE_SECRET}" \
            -H "Content-Type: application/json")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "WARNING: Pope bot returned non-200 status"
            exit 1
          fi